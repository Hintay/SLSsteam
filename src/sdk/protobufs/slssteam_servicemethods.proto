// ServiceMethod messages reused from OpenSteamTool's steam_messages.proto for
// SLSsteam Phase 1: manifest request-code (T5) and Player.GetUserStats (T8).
// CMsgClientGetUserStats[Response] (818/819) are intentionally NOT here —
// they already exist in steammessages_clientserver_userstats.pb.
// LITE_RUNTIME to link against the vendored libprotobuf-lite (3.15.x).
syntax = "proto2";
option optimize_for = LITE_RUNTIME;

// Player.GetUserStats — ServiceMethod (out eMsg 151 / in eMsg 147), used by setStat (T8).
message CPlayer_GetUserStats_Request {
	optional uint64 steamid = 1;
	optional uint32 appid = 2;
	optional bytes sha_schema = 3;
	optional uint32 crc_stats = 4;
}

message CPlayer_GetUserStats_Response {
	message Unlock_Time {
		optional uint32 achievement_bit = 1;
		optional fixed32 unlock_time = 2;
	}
	message Stats {
		optional uint32 stat_id = 1;
		optional uint32 stat_value = 2;
		repeated .CPlayer_GetUserStats_Response.Unlock_Time unlock_times = 3;
	}
	optional bytes sha_schema = 1;
	optional uint32 crc_stats = 2;
	optional bytes schema = 3;
	repeated .CPlayer_GetUserStats_Response.Stats stats = 4;
}

// ContentServerDirectory.GetManifestRequestCode — ServiceMethod, used by requestcode (T5).
message CContentServerDirectory_GetManifestRequestCode_Request {
	optional uint32 app_id = 1;
	optional uint32 depot_id = 2;
	optional uint64 manifest_id = 3;
	optional string app_branch = 4;
	optional string branch_password_hash = 5;
}

message CContentServerDirectory_GetManifestRequestCode_Response {
	optional uint64 manifest_request_code = 1;
}
